<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>Sign Up - FastX</title>
  <meta name="description" content="Create a FastX account to get started with fast and AI-recommended food delivery.">
  
  <!-- Google Fonts: Plus Jakarta Sans for Headers, Inter for Body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets (Paths use "../" to resolve correctly from the /customer directory) -->
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

  <main class="auth-section">
    <!-- Visual background glow card element -->
    <div class="auth-bg-glow" aria-hidden="true"></div>

    <div class="auth-container" style="max-width: 460px;">
      
      <!-- Brand Logo -->
      <div class="auth-logo-row">
        <a href="../index.html" class="navbar-logo" id="logo-link">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="var(--color-primary)" stroke="var(--color-primary)"/>
          </svg>
          Fast<span>X</span>
        </a>
      </div>

      <!-- Main Sign Up glass card container -->
      <div class="auth-card">
        
        <div class="auth-header">
          <h1 class="text-2xl">Create Account</h1>
          <p class="auth-subtitle">Join FastX for fast and AI-personalized delivery</p>
        </div>

        <!-- Form Element -->
        <form id="register-form" onsubmit="processRegister(event)">
          
          <!-- Full Name Input -->
          <div class="input-group">
            <label class="input-label" for="reg-name">Full Name</label>
            <input class="input-field" type="text" id="reg-name" required placeholder="Enter your full name">
          </div>

          <!-- Email Input -->
          <div class="input-group">
            <label class="input-label" for="reg-email">Email Address</label>
            <input class="input-field" type="email" id="reg-email" required placeholder="name@domain.com">
          </div>

          <!-- Password Input -->
          <div class="input-group" style="margin-bottom: var(--space-3);">
            <label class="input-label" for="reg-password">Password</label>
            <div class="password-input-wrapper">
              <input class="input-field" type="password" id="reg-password" required placeholder="Min 8 characters" oninput="checkPasswordStrength(this.value)">
              <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('reg-password')" aria-label="Toggle Password Visibility">
                <svg class="icon icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Password Strength Indicator Bars -->
          <div class="strength-indicator" id="strength-bars">
            <div class="strength-bar" id="bar-1"></div>
            <div class="strength-bar" id="bar-2"></div>
            <div class="strength-bar" id="bar-3"></div>
          </div>

          <!-- Confirm Password Input -->
          <div class="input-group">
            <label class="input-label" for="reg-confirm-password">Confirm Password</label>
            <div class="password-input-wrapper">
              <input class="input-field" type="password" id="reg-confirm-password" required placeholder="Re-enter password">
              <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('reg-confirm-password')" aria-label="Toggle Password Visibility">
                <svg class="icon icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Terms and Conditions checkbox -->
          <div class="auth-options-row" style="margin-bottom: var(--space-4);">
            <label class="checkbox-label" style="align-items: flex-start;">
              <input type="checkbox" id="terms-agree" required style="margin-top: 3px;">
              <span class="text-xs">I agree to the FastX <a href="#" class="forgot-link">Terms of Service</a> & <a href="#" class="forgot-link">Privacy Policy</a></span>
            </label>
          </div>

          <!-- Submit Button -->
          <button class="btn btn-primary btn-block" type="submit" id="submit-btn">
            Create Account
          </button>

        </form>

        <!-- Social divider -->
        <div class="divider-row">
          <div class="divider-line"></div>
          <span>Or sign up with</span>
          <div class="divider-line"></div>
        </div>

        <!-- Social Buttons Grid -->
        <div class="social-buttons-grid">
          <button class="btn-social" onclick="mockSocialLogin('Google')" aria-label="Sign up with Google">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          
          <button class="btn-social" onclick="mockSocialLogin('GitHub')" aria-label="Sign up with GitHub">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.167 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.577.688.479C19.138 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
            </svg>
            GitHub
          </button>
        </div>

        <!-- Card Footer -->
        <div class="auth-footer">
          Already have an account? <a href="login.html">Log In</a>
        </div>

      </div>

    </div>
  </main>

  <!-- Link Authentication Logic -->
  <script src="../js/pages/auth.js"></script>
</body>
</html>
